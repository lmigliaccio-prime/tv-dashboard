<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard TV</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;              /* 👈 mantém topo visível */
      left: 0;
      width: 100%;
      height: calc(100% + 80px); /* 👈 aumenta altura */
      bottom: -80px;       /* 👈 empurra pra esconder barra de baixo */
      border: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <iframe 
      src="https://app.powerbi.com/view?r=eyJrIjoiNmZhODA0ZDUtMGViOS00ZmRiLTlmZjQtOWQ1ZGM5NjJjYjJmIiwidCI6ImJmNDQ1ODhhLTk2NDQtNGZmMC05ZjRiLTU4ZGMwMzdjZDJmNiJ9"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    // Atualiza a cada 20 minutos
    setInterval(() => {
      const iframe = document.querySelector("iframe");
      iframe.src = iframe.src;
    }, 1000 * 60 * 30);
  </script>

</body>
</html>
