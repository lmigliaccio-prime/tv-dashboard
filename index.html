<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard TV</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% + 80px);
      bottom: -80px;
      border: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <iframe 
      src="https://app.powerbi.com/view?r=eyJrIjoiNmZhODA0ZDUtMGViOS00ZmRiLTlmZjQtOWQ1ZGM5NjJjYjJmIiwidCI6ImJmNDQ1ODhhLTk2NDQtNGZmMC05ZjRiLTU4ZGMwMzdjZDJmNiJ9"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    function atualizarCiclo15Min() {
      const agora = new Date();
      const minutos = agora.getMinutes();
      const segundos = agora.getSeconds();

      const inicio = 17;
      const intervalo = 15;

      let proximo;

      if (minutos < inicio) {
        proximo = inicio;
      } else {
        const diff = minutos - inicio;
        const passos = Math.floor(diff / intervalo) + 1;
        proximo = inicio + passos * intervalo;
      }

      if (proximo >= 60) {
        proximo = proximo; // mantém para cálculo (ex: 62, 77...)
      }

      const espera = ((proximo - minutos) * 60 - segundos) * 1000;

      setTimeout(() => {
        const iframe = document.querySelector("iframe");
        iframe.src = iframe.src;

        atualizarCiclo15Min(); // loop contínuo
      }, espera);
    }

    atualizarCiclo15Min();
  </script>

</body>
</html>
