<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard TV</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% + 80px);
      bottom: -80px;
      border: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <iframe 
      src="https://app.powerbi.com/view?r=eyJrIjoiNmZhODA0ZDUtMGViOS00ZmRiLTlmZjQtOWQ1ZGM5NjJjYjJmIiwidCI6ImJmNDQ1ODhhLTk2NDQtNGZmMC05ZjRiLTU4ZGMwMzdjZDJmNiJ9"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    let ultimoRefresh = Date.now();

    function atualizarIframe() {
      const iframe = document.querySelector("iframe");
      iframe.src = iframe.src;
      ultimoRefresh = Date.now();
      console.log("Atualizado em:", new Date().toLocaleTimeString());
    }

    function atualizarHorariosFixos() {
      const agora = new Date();
      const minutos = agora.getMinutes();
      const segundos = agora.getSeconds();

      const pontos = [5, 15, 20];

      let proximo = pontos.find(p => p >= minutos);

      if (proximo === undefined) {
        proximo = 65; // próxima hora (60 + 5)
      }

      const espera = ((proximo - minutos) * 60 - segundos) * 1000;

      setTimeout(() => {
        atualizarIframe();
        atualizarHorariosFixos();
      }, espera);
    }

    // 🔥 fallback: força atualização se passar 20 minutos sem atualizar
    setInterval(() => {
      const agora = Date.now();
      const tempoSemAtualizar = agora - ultimoRefresh;

      if (tempoSemAtualizar > 20 * 60 * 1000) {
        console.log("Fallback ativado");
        atualizarIframe();
      }
    }, 60 * 1000); // verifica a cada 1 min

    atualizarHorariosFixos();
  </script>

</body>
</html>
