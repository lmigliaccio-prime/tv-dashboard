<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard TV</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% + 80px);
      bottom: -80px;
      border: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <iframe 
      src="https://app.powerbi.com/view?r=eyJrIjoiN2VmOWFlZmMtOTBkNy00ZjZjLTk5MjgtOTllNjVjNGYzYzkxIiwidCI6ImJmNDQ1ODhhLTk2NDQtNGZmMC05ZjRiLTU4ZGMwMzdjZDJmNiJ9&pageName=f9a189f3ad40642e6ee7"
      allowfullscreen>
    </iframe>
  </div>

  <script>
  function atualizarNoMinuto18() {
    const agora = new Date();
    const minutos = agora.getMinutes();
    const segundos = agora.getSeconds();

    let proximo = 18;

    if (minutos > 18 || (minutos === 18 && segundos > 0)) {
      proximo = 78; // próxima hora (60 + 18)
    }

    const espera = ((proximo - minutos) * 60 - segundos) * 1000;

    setTimeout(() => {
      const iframe = document.querySelector("iframe");
      iframe.src = iframe.src;

      atualizarNoMinuto18(); // loop contínuo
    }, espera);
  }

  atualizarNoMinuto18();
</script>

</body>
</html>
